syntax = "proto3";

package job;

option go_package = "job_service/proto;proto";

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_OPEN = 1;
  JOB_STATUS_IN_PROGRESS = 2;
  JOB_STATUS_COMPLETED = 3;
  JOB_STATUS_CANCELLED = 4;
}

service JobService {
  rpc CreateJob(CreateJobRequest) returns (CreateJobResponse);
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
  rpc ApplyToJob(ApplyToJobRequest) returns (ApplyToJobResponse);
  rpc GetJobDetails(GetJobDetailsRequest) returns (JobDetailsResponse);
  rpc CompleteJob(CompleteJobRequest) returns (CompleteJobResponse);
}

message Job {
  int64 id = 1;
  int64 client_id = 2;
  string title = 3;
  string description = 4;
  int64 budget_cents = 5;
  JobStatus status = 6;
  int64 created_at_unix = 7;
}

message CreateJobRequest {
  int64 client_id = 1;
  string title = 2;
  string description = 3;
  int64 budget_cents = 4;
}

message CreateJobResponse {
  Job job = 1;
}

message ListJobsRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListJobsResponse {
  repeated Job jobs = 1;
  string next_page_token = 2;
}

message ApplyToJobRequest {
  int64 job_id = 1;
  int64 freelancer_id = 2;
  string cover_letter = 3;
  int64 bid_cents = 4;
}

message ApplyToJobResponse {
  int64 application_id = 1;
}

message GetJobDetailsRequest {
  int64 job_id = 1;
}

message JobDetailsResponse {
  Job job = 1;
  int32 applications_count = 2;
}

message CompleteJobRequest {
  int64 job_id = 1;
  int64 client_id = 2;
}

message CompleteJobResponse {
  Job job = 1;
}
