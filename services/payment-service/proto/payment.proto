syntax = "proto3";

package payment;

option go_package = "payment_service/proto;proto";

enum EscrowStatus {
  ESCROW_STATUS_UNSPECIFIED = 0;
  ESCROW_STATUS_HELD = 1;
  ESCROW_STATUS_RELEASED = 2;
  ESCROW_STATUS_REFUNDED = 3;
  ESCROW_STATUS_CANCELLED = 4;
}

enum TransactionType {
  TRANSACTION_TYPE_UNSPECIFIED = 0;
  TRANSACTION_TYPE_DEPOSIT = 1;
  TRANSACTION_TYPE_ESCROW_HOLD = 2;
  TRANSACTION_TYPE_ESCROW_RELEASE = 3;
  TRANSACTION_TYPE_REFUND = 4;
  TRANSACTION_TYPE_WITHDRAWAL = 5;
}

enum TransactionStatus {
  TRANSACTION_STATUS_UNSPECIFIED = 0;
  TRANSACTION_STATUS_PENDING = 1;
  TRANSACTION_STATUS_COMPLETED = 2;
  TRANSACTION_STATUS_FAILED = 3;
  TRANSACTION_STATUS_CANCELLED = 4;
}

service PaymentService {
  rpc CreateAccount(CreateAccountRequest) returns (PaymentAccountResponse);
  rpc GetAccount(GetAccountRequest) returns (PaymentAccountResponse);
  rpc Deposit(DepositRequest) returns (TransactionResponse);
  rpc CreateEscrow(CreateEscrowRequest) returns (EscrowResponse);
  rpc ReleaseEscrow(ReleaseEscrowRequest) returns (EscrowResponse);
  rpc RefundEscrow(RefundEscrowRequest) returns (EscrowResponse);
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse);
}

message PaymentAccount {
  string id = 1;
  string user_id = 2;
  int64 available_cents = 3;
  int64 escrow_cents = 4;
  string currency = 5;
  int64 created_at_unix = 6;
  int64 updated_at_unix = 7;
}

message Escrow {
  string id = 1;
  string job_id = 2;
  string client_id = 3;
  string freelancer_id = 4;
  int64 amount_cents = 5;
  string currency = 6;
  EscrowStatus status = 7;
  int64 held_at_unix = 8;
  int64 released_at_unix = 9;
  int64 refunded_at_unix = 10;
}

message Transaction {
  string id = 1;
  string user_id = 2;
  string job_id = 3;
  string escrow_id = 4;
  TransactionType type = 5;
  int64 amount_cents = 6;
  string currency = 7;
  TransactionStatus status = 8;
  string provider = 9;
  string provider_reference = 10;
  int64 created_at_unix = 11;
}

message CreateAccountRequest {
  string user_id = 1;
  string currency = 2;
}

message GetAccountRequest {
  string user_id = 1;
}

message DepositRequest {
  string user_id = 1;
  int64 amount_cents = 2;
  string currency = 3;
  string provider = 4;
  string provider_reference = 5;
}

message CreateEscrowRequest {
  string job_id = 1;
  string client_id = 2;
  string freelancer_id = 3;
  int64 amount_cents = 4;
  string currency = 5;
}

message ReleaseEscrowRequest {
  string escrow_id = 1;
  string requester_id = 2;
}

message RefundEscrowRequest {
  string escrow_id = 1;
  string requester_id = 2;
}

message ListTransactionsRequest {
  string user_id = 1;
  int32 limit = 2;
  int64 offset = 3;
}

message PaymentAccountResponse {
  PaymentAccount account = 1;
}

message TransactionResponse {
  Transaction transaction = 1;
  PaymentAccount account = 2;
}

message EscrowResponse {
  Escrow escrow = 1;
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
}
