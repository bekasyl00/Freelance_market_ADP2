services:
  postgres:
    image: postgres:17-alpine
    container_name: freelance-postgres
    environment:
      POSTGRES_DB: freelance_market
      POSTGRES_USER: freelance
      POSTGRES_PASSWORD: freelance
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freelance -d freelance_market"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build:
      context: ./gateway
    container_name: freelance-gateway
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://freelance:freelance@postgres:5432/freelance_market?sslmode=disable
      PORT: 8080
    ports:
      - "8088:8080"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: freelance-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.2
    container_name: freelance-grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"

  loki:
    image: grafana/loki:2.9.0
    container_name: freelance-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:2.2.0
    container_name: freelance-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./grafana/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"   # tempo
      - "4317:4317"   # otlp grpc
      - "4318:4318"   # otlp http

volumes:
  postgres_data:
