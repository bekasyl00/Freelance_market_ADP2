apiVersion: 1

groups:
  - orgId: 1
    name: Freelance Market API
    folder: Freelance Market
    interval: 1m
    rules:
      - uid: gateway-down
        title: Gateway is down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: up{job="gateway"}
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        for: 2m
        noDataState: Alerting
        execErrState: Alerting
        annotations:
          summary: Go gateway metrics target is unavailable.
        labels:
          severity: critical

      - uid: high-latency
        title: High gateway p95 latency
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="gateway"}[5m]))
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [2]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        for: 5m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: p95 latency for gateway is above 2 seconds.
        labels:
          severity: warning
