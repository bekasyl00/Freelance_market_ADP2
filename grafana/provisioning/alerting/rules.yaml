apiVersion: 1

groups:
  - orgId: 1
    name: Freelance Market API
    folder: Freelance Market
    interval: 1m
    rules:
      - uid: gateway-down
        title: Gateway is down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: up{job="gateway"}
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        for: 2m
        noDataState: Alerting
        execErrState: Alerting
        annotations:
          summary: Go gateway metrics target is unavailable.
        labels:
          severity: critical

      - uid: high-error-rate
        title: High gateway error rate
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: sum(rate(http_requests_total{job="gateway",status=~"5.."}[5m])) / clamp_min(sum(rate(http_requests_total{job="gateway"}[5m])), 1)
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        for: 5m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: More than 5 percent of gateway requests are failing.
        labels:
          severity: warning
