services:
  - type: web
    name: freelance-gateway
    runtime: go
    rootDir: gateway
    buildCommand: go build -o /opt/render/project/output/gateway ./cmd
    startCommand: /opt/render/project/output/gateway
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: "8080"
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /health
